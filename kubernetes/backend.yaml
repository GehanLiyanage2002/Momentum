apiVersion: apps/v1
kind: Deployment
metadata:
  name: momentum-backend
spec:
  replicas: 1 # Number of pods to run
  selector:
    matchLabels:
      app: momentum-backend
  template:
    metadata:
      labels:
        app: momentum-backend
    spec:
      containers:
      - name: backend
        # Replace with your actual ACR login server
        image: momentumregistryxyz123.azurecr.io/momentum-backend:latest
        ports:
        - containerPort: 5000
        env:
        # For now, we will hardcode secrets. Later, we will use Kubernetes Secrets for security!
        - name: MONGO_URI
          value: "mongodb+srv://donliyanage2002_db_user:Ui1QUon6MJNglZJP@cluster1.mongodb.net/momentum?retryWrites=true&w=majority"
        - name: JWT_SECRET
          value: "5a70b7b18cff9a692487d735b0d93c276d6c41b0dbe858d286357f8e6319f15c"
          
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
spec:
  selector:
    app: momentum-backend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5000
  type: LoadBalancer # This provisions an Azure Public IP!